# HybridGAN-BWE MLOps Smoke Test Configuration

mlflow:
  enabled: true
  experiment_name: "HybridGAN-BWE-SmokeTest"
  tracking_uri: "mlruns"
  log_system_metrics: true
  log_checkpoints_as_artifacts: true
  seed: 42

audio:
  input_sr: 8000
  target_sr: 16000
  segment_length: 16384
  degradation_type: "dynamic"

dataset:
  train_manifest: "manifests/train.json"
  val_manifest: "manifests/val.json"
  test_manifest: "manifests/test.json"
  batch_size: 4
  num_workers: 2
  pin_memory: true
  crop_type: "random"

train:
  epochs: 1
  learning_rate: 0.0002
  adam_beta1: 0.8
  adam_beta2: 0.99
  lr_decay: 0.999
  gradient_accumulation_steps: 1
  mixed_precision: true
  gradient_checkpointing: false
  grad_clip_val: 10.0
  save_interval_epochs: 1
  val_interval_epochs: 1
  early_stopping_patience: 15
  resume_checkpoint: null

logging:
  tensorboard_dir: "outputs/tensorboard_smoke"
  checkpoint_dir: "checkpoints/smoke"
  csv_log_file: "outputs/train_logs_smoke.csv"

generator:
  use_waveform_branch: true
  use_spectral_branch: true
  use_cross_attention: true
  
  waveform_encoder:
    in_channels: 1
    channels: 64
    num_blocks: 4
    strides: [2, 2, 2]
    kernel_sizes: [15, 15, 15]
    dilations: [1, 2, 4, 8]
    
  spectral_encoder:
    fft_size: 512
    hop_length: 128
    win_length: 512
    channels: 32
    num_layers: 4
    
  attention:
    dim: 128
    num_heads: 4
    
  decoder:
    upsample_rates: [2, 2, 2]
    upsample_kernel_sizes: [16, 16, 16]
    channels: 64
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilations: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]

discriminator:
  mpd:
    periods: [2, 3, 5, 7, 11]
    channels: 32
  
  msd:
    scales: [1, 2, 4]
    channels: 32
  
  spectral:
    use_magnitude: true
    use_phase: true
    fft_sizes: [256, 512, 1024]
    hop_lengths: [64, 128, 256]
    win_lengths: [256, 512, 1024]
    channels: 16

losses:
  adv_g_weight: 1.0
  fm_weight: 2.0
  waveform_l1_weight: 100.0
  mr_stft_weight: 15.0
  phase_consistency_weight: 45.0
  mel_spectrogram_weight: 45.0
